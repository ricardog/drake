name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        emacs_version: ['28.2', '30.1']
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Emacs
      uses: purcell/setup-emacs@master
      with:
        version: ${{ matrix.emacs_version }}

    - name: Install system dependencies
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          sudo apt-get update
          sudo apt-get install -y cmake gnuplot build-essential
        else
          brew install cmake gnuplot
        fi

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build with CMake
      run: |
        # Set up and run full CMake test suite
        mkdir -p build
        cd build
        cmake ..
        make
        cd ..

    - name: Run Core ERT Tests
      run: |
        # Run specific test files via Emacs directly as documented
        cd build
        ctest
        cd ..
